<!DOCTYPE html>
<html>
<head>
    <title>Login - GlowCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h3 class="text-center">Login</h3>

        <input type="email" id="loginEmail" class="form-control my-2" placeholder="Enter Email">
        <input type="password" id="loginPassword" class="form-control my-2" placeholder="Enter Password">

        <button class="btn btn-primary w-100 mt-2" onclick="loginUser()">Login</button>

        <p class="text-center mt-3">
            New user? <a href="register.html">Register</a>
        </p>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
